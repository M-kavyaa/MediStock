<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediStock - Login</title>
  <link rel="stylesheet" href="style1.css" />
</head>

<body>

  <div class="main-container">

    <!-- LEFT PANEL -->
    <div class="left-side">
      <div class="dna-overlay"></div>

      <div class="left-content">
        <h1>MediStock</h1>
        <h2>Centralized Jan Aushadhi Inventory & Expiry Optimization System</h2>
        <p>
          FEFO-based Multi-Kendra Inventory Management with Transfer
          Recommendation and Demand Forecasting.
        </p>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-side">

      <div class="role-tabs">
        <button class="active" id="staffBtn" type="button">Kendra Staff</button>
        <button id="adminBtn" type="button">Government Admin</button>
      </div>

      <h2>Welcome!</h2>

      <form onsubmit="loginUser(event)">


        <!-- STAFF DROPDOWN -->
        <div class="form-group" id="staffField">
          <select id="kendraSelect">
            <option value="" disabled selected>Select Kendra ID</option>
            <option value="JA001">JA001 - Jaipur Central</option>
            <option value="JA002">JA002 - Ajmer Road</option>
            <option value="JA003">JA003 - Kota Main</option>
          </select>

          <span class="icon-right">
            <!-- dropdown icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </span>
        </div>

        <!-- ADMIN EMAIL INPUT -->
        <div class="form-group" id="adminField" style="display:none;">
          <!-- <input type="email" id="adminEmail" placeholder="Admin Email" /> -->
          <input type="text" id="username" placeholder="Username">


          <span class="icon-right">
            <!-- user icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
              <circle cx="12" cy="7" r="4" stroke-width="2" />
            </svg>
          </span>
        </div>

        <!-- PASSWORD -->
        <div class="form-group">
          <input type="password" id="password" placeholder="Password" />

          <span class="icon-right" id="toggleEye">
            <!-- eye icon -->
            <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="_toggle_ M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7
                -1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              <circle cx="12" cy="12" r="3" stroke-width="2" />
            </svg>

            <svg id="eyeClosed" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
              fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.477 10.48A3 3 0 0112 9c1.657 0 3 1.343 3 3
                0 .517-.131 1.002-.362 1.425" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6.228 6.228C4.344 7.52 3.04 9.56 2.458 12
                3.732 16.057 7.523 19 12 19c1.88 0 3.64-.52 5.132-1.41" />
            </svg>
          </span>
        </div>

        <div class="row-options">
          <label>
            <input type="checkbox" />
            Remember me
          </label>
          <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">Login</button>

        <div class="bottom-note">
          Authorized access only. Accounts are managed centrally.
        </div>
      </form>

    </div>

  </div>

  <script>
    const staffBtn = document.getElementById("staffBtn");
    const adminBtn = document.getElementById("adminBtn");

    const staffField = document.getElementById("staffField");
    const adminField = document.getElementById("adminField");

    staffBtn.addEventListener("click", () => {
      staffBtn.classList.add("active");
      adminBtn.classList.remove("active");

      staffField.style.display = "block";
      adminField.style.display = "none";
    });

    adminBtn.addEventListener("click", () => {
      adminBtn.classList.add("active");
      staffBtn.classList.remove("active");

      staffField.style.display = "none";
      adminField.style.display = "block";
    });

    // Password toggle
    const toggleEye = document.getElementById("toggleEye");
    const password = document.getElementById("password");
    const eyeOpen = document.getElementById("eyeOpen");
    const eyeClosed = document.getElementById("eyeClosed");

    toggleEye.addEventListener("click", () => {
      if (password.type === "password") {
        password.type = "text";
        eyeOpen.style.display = "none";
        eyeClosed.style.display = "block";
      } else {
        password.type = "password";
        eyeOpen.style.display = "block";
        eyeClosed.style.display = "none";
      }
    });
  </script>
  <script>
    async function loginUser(event) {
      event.preventDefault();

      const password = document.getElementById("password").value;

      let role;
      let username = null;
      let kendra_code = null;

      // Detect which tab is active
      if (adminBtn.classList.contains("active")) {
        role = "ADMIN";
        username = document.getElementById("username").value;
      } else {
        role = "SHOPKEEPER";
        kendra_code = document.getElementById("kendraSelect").value;
        username = kendra_code; // or use separate shop username if needed
      }

      console.log("Role:", role);
      console.log("Username:", username);

      try {
        const response = await fetch("http://localhost:5000/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username,
            password,
            role,
            kendra_code
          })
        });

        const data = await response.json();
        console.log("Server Response:", data);

        if (data.success) {
          if (role === "ADMIN") {
            window.location.href = "admin.html";
          } else {
            localStorage.setItem("kendra_code", kendra_code);
            window.location.href = "kendrastaff.html";
          }
        } else {
          alert("Invalid Credentials");
        }

      } catch (error) {
        console.error("Login Error:", error);
      }
    }
  </script>


</body>

</html>
